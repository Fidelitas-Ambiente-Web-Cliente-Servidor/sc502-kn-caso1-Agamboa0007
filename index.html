<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Gourmet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Restaurante Gourmet</h1>
    </header>

    <!-- MENÚ -->
    <section>
        <h2>Menú</h2>

        <div class="filtros">
            <button onclick="filtrarCategoria('Todos')">Todos</button>
            <button onclick="filtrarCategoria('Entrada')">Entradas</button>
            <button onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
            <button onclick="filtrarCategoria('Postre')">Postres</button>
        </div>

        <div id="contenedorMenu"></div>
    </section>

    <!-- FORMULARIO -->
    <section>
        <h2>Reservas</h2>

        <form id="formReserva">

            <div>
                <label>Nombre Completo</label>
                <input type="text" id="nombre">
                <div id="errorNombre" class="error-campo"></div>
            </div>

            <div>
                <label>Correo Electrónico</label>
                <input type="email" id="correo">
                <div id="errorCorreo" class="error-campo"></div>
            </div>

            <div>
                <label>Fecha</label>
                <input type="date" id="fecha">
                <div id="errorFecha" class="error-campo"></div>
            </div>

            <div>
                <label>Hora</label>
                <select id="hora">
                    <option value="">Seleccione</option>
                    <option>12:00</option>
                    <option>13:00</option>
                    <option>18:00</option>
                    <option>19:00</option>
                    <option>20:00</option>
                </select>
            </div>

            <div>
                <label>Número de Personas</label>
                <input type="number" id="personas">
                <div id="errorPersonas" class="error-campo"></div>
            </div>

            <div>
                <label>Comentarios</label>
                <textarea id="comentarios"></textarea>
            </div>

            <button type="submit" id="btnEnviar" disabled>
                Reservar
            </button>

        </form>
    </section>

    <!-- TABLA -->
    <section>
        <h2>Reservas Registradas</h2>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Personas</th>
                </tr>
            </thead>

            <tbody id="tablaReservas"></tbody>
        </table>

        <div id="resumen" class="resumen-reservas"></div>

    </section>

    <script src="js/app.js"></script>
</body>
</html>
